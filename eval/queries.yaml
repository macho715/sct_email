meta:
  description: "HVDC Email Search — 50-query evaluation set"
  embed_model: "paraphrase-multilingual-MiniLM-L12-v2"
  embed_dim: 384
  top_k: 10
  notes: |
    expected_nos lists email `no` values that should appear in top-10.
    Leave [] when ground truth is unknown; fill in after reviewing results.
    zero_result queries must return 0 hits for zero_result_rate to be 100%.

